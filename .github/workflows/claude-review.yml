name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Check secrets
        id: gate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Secrets 未設定のためスキップ (SETUP.md 参照)"
          fi
      - uses: actions/checkout@v4
        if: steps.gate.outputs.skip != 'true'
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        if: steps.gate.outputs.skip != 'true'
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            この PR をレビューしてください。.claude/agents/code-reviewer.md の観点と出力形式に従い、
            .claude/rules/ の規約違反・セキュリティ・型・テスト欠落を [must] / [nits] で指摘してください。
            問題がなければ「must 指摘なし」とだけコメントしてください。
          claude_args: |
            --model sonnet
            --max-turns 15
