name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Check secrets
        id: gate
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -z "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Secrets 未設定のためスキップ (docs/operations.md 参照)"
          fi
      - uses: actions/checkout@v4
        if: steps.gate.outputs.skip != 'true'
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        if: steps.gate.outputs.skip != 'true'
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            この PR をレビューしてください。.claude/agents/code-reviewer.md の観点と出力形式に従い、
            .claude/rules/ の規約違反・セキュリティ・型・テスト欠落を [must] / [nits] で指摘してください。
            問題がなければ「must 指摘なし」とだけコメントしてください。
          claude_args: |
            --model sonnet
            --max-turns 40
            --allowedTools "Bash(git diff:*),Bash(git log:*),Bash(git show:*)"
