name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

# concurrency の cancel-in-progress: true は使わない — workflow レベルのキャンセルは
# waiting (承認待ち) と in_progress (デプロイ実行中) を区別せず、人間が承認して
# wrangler deploy が走っている run まで途中で強制キャンセルしてしまう (#68 レビュー指摘 / #83)。
# 代わりに:
# - 承認待ちで滞留した古い run の掃除 (#66 対策) は cancel-stale-waiting ジョブが
#   status=waiting の run だけを対象に API で行う
# - デプロイの直列化は deploy ジョブ側の concurrency (cancel-in-progress: false) で行う

permissions:
  contents: read

jobs:
  # 承認されないまま waiting で残った古い run がスロットを塞ぎ、後続リリースの run が
  # 永久に pending になるのを防ぐ (#66)。in_progress の run には決して触れない
  cancel-stale-waiting:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write
    steps:
      - name: 承認待ちのまま滞留した古い run をキャンセル
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/deploy.yml/runs?status=waiting&per_page=100" \
            --jq ".workflow_runs[] | select(.id != ${RUN_ID} and .run_number < ${RUN_NUMBER}) | .id" \
          | while read -r id; do
              echo "古い承認待ち run をキャンセル: ${id}"
              gh api --method POST "repos/${GITHUB_REPOSITORY}/actions/runs/${id}/cancel" \
                || echo "::warning::run ${id} のキャンセルに失敗 (すでに終了している可能性)"
            done

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # 直列化のみでキャンセルはしない: 実行中のデプロイがある間、次の run はここで待つ
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    # 本番の決定論的な最終ゲート: production 環境の required reviewers (人間) が
    # 承認するまでこのジョブは開始されない (設定は scripts/setup-branch-protection.sh)
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Check secrets
        id: gate
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Cloudflare secrets 未設定のためデプロイをスキップ (docs/operations.md 参照)"
          fi
      - uses: actions/checkout@v4
        if: steps.gate.outputs.skip != 'true'
      - uses: pnpm/action-setup@v4
        if: steps.gate.outputs.skip != 'true'
        with:
          version: 9
      - uses: actions/setup-node@v4
        if: steps.gate.outputs.skip != 'true'
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        if: steps.gate.outputs.skip != 'true'

      # デプロイ前にも品質ゲートを通す (Stop hook と同じ基準)
      - name: Verify
        if: steps.gate.outputs.skip != 'true'
        run: pnpm typecheck && pnpm lint && pnpm test

      # SPA をビルドして Worker + Durable Object をデプロイ
      - name: Build & Deploy
        if: steps.gate.outputs.skip != 'true'
        run: pnpm build && pnpm exec wrangler deploy
